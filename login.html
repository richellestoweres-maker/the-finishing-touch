<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in – The Finishing Touch</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Manrope:wght@400;600&family=Allura&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />

  <style>
    .auth-wrap{width:min(460px,92%);margin:64px auto;background:#fff;padding:28px;border-radius:16px;box-shadow:var(--shadow,0 12px 30px rgba(0,0,0,.08))}
    .auth-wrap h1{font-family:"Playfair Display",serif;font-size:1.9rem;text-align:center;margin:0 0 1rem;color:var(--taupe-900,#2e2a27)}
    .auth-wrap form{display:grid;gap:14px}
    .auth-wrap label{display:grid;gap:6px;font-weight:600;color:var(--taupe-900,#2e2a27)}
    .auth-wrap input{border:1px solid #e3d9ce;border-radius:12px;padding:.8rem .9rem;background:#fffdfb;color:var(--taupe-900,#2e2a27);font-size:16px}
    .auth-wrap .btn{width:100%;margin-top:6px}
    .auth-wrap p{text-align:center;margin-top:14px}
    .auth-wrap a{color:var(--taupe-900,#2e2a27);font-weight:600;text-decoration:none}
    .error{color:#b00020;font-weight:600;margin-top:6px;text-align:center}
    .muted{color:#7b746e;font-size:.95rem}
  </style>
</head>

<body>
  <div class="auth-wrap">
    <div style="margin-bottom:10px;">
      <a class="btn btn-outline" href="index.html">← Back home</a>
    </div>

    <h1>Welcome back</h1>

    <form id="loginForm" method="post" action="#" novalidate>
      <label>Email
        <input id="loginEmail" type="email" name="email" autocomplete="username" required />
      </label>

      <label>Password
        <input id="loginPass" type="password" name="password" autocomplete="current-password" required />
      </label>

      <button id="loginBtn" type="submit" class="btn btn-solid">Sign In</button>

      <p class="muted">Don’t have an account? <a id="signupLink" href="signup.html">Create one</a></p>
      <p id="loginError" class="error" aria-live="polite" hidden></p>
      <p class="muted"><a id="resetLink" href="reset-password.html">Forgot your password?</a></p>
    </form>
  </div>

  <script type="module">
    import { auth, db } from "./ft-firebase.js";
    import {
      signInWithEmailAndPassword,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-auth.js";
    import {
      doc, getDoc, setDoc, serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.13.1/firebase-firestore.js";

    const form = document.getElementById("loginForm");
    const email = document.getElementById("loginEmail");
    const pass = document.getElementById("loginPass");
    const btn = document.getElementById("loginBtn");
    const errEl = document.getElementById("loginError");
    const signupLink = document.getElementById("signupLink");
    const resetLink = document.getElementById("resetLink");

    const ALLOWED_NEXT = new Set([
      "admin-dashboard.html",
      "contractor-dashboard.html",
      "client-dashboard.html",
      "delete-my-account.html",
      "contractor-apply.html",
      "employee-waitlist.html"
    ]);

    function cleanNextPath(next){
      let value = String(next || "").trim();

      if (!value) return "";
      if (/^https?:\/\//i.test(value)) return "";
      if (/^\/\//.test(value)) return "";

      value = value.replace(/^\.?\//, "");
      value = value.split("#")[0].split("?")[0];

      return ALLOWED_NEXT.has(value) ? value : "";
    }

    function safeNextFromQuery(){
      const params = new URLSearchParams(location.search);
      return cleanNextPath(params.get("next") || "");
    }

    function preserveNextOnLinks(){
      const next = safeNextFromQuery();

      if (next) {
        signupLink.href = `signup.html?next=${encodeURIComponent(next)}`;
        resetLink.href = `reset-password.html?next=${encodeURIComponent(next)}`;
      }
    }

    async function ensureUserDoc(user){
      const ref = doc(db, "users", user.uid);
      const snap = await getDoc(ref);

      if (!snap.exists()) {
        await setDoc(ref, {
          displayName: user.displayName || user.email || user.uid,
          email: user.email || "",
          role: "client",
          accountStatus: "active",
          portalAccess: "allowed",
          isActive: true,
          serviceTypes: [],
          createdAt: serverTimestamp(),
          updatedAt: serverTimestamp()
        });

        const freshSnap = await getDoc(ref);
        return freshSnap.data() || {};
      }

      return snap.data() || {};
    }

    function roleHome(role, profile){
      const normalizedRole = String(role || "").toLowerCase();
      const contractorStage = String(profile.contractorStage || "").toLowerCase();
      const contractorStatus = String(profile.contractorStatus || "").toLowerCase();
      const portalAccess = String(profile.portalAccess || "").toLowerCase();
      const accountStatus = String(profile.accountStatus || "").toLowerCase();

      if (accountStatus === "archived" || portalAccess === "removed") {
        return "delete-my-account.html";
      }

      if (normalizedRole === "admin") return "admin-dashboard.html";
      if (normalizedRole === "client") return "client-dashboard.html";

      if (
        normalizedRole === "contractor" ||
        contractorStage === "onboarding" ||
        contractorStatus === "pending_documents" ||
        contractorStatus === "pending_admin_review" ||
        portalAccess === "onboarding_only"
      ) {
        return "contractor-dashboard.html";
      }

      if (normalizedRole === "pending") return "contractor-apply.html";
      if (normalizedRole === "employee_waitlist") return "employee-waitlist.html";

      return "client-dashboard.html";
    }

    function nextAllowedForRole(next, role, profile){
      if (!next) return "";

      const normalizedRole = String(role || "").toLowerCase();

      // Let any signed-in user reach the self-delete page.
      if (next === "delete-my-account.html") return next;

      // Admin can return to the admin dashboard.
      if (next === "admin-dashboard.html" && normalizedRole === "admin") return next;

      // Contractors and approved onboarding users can return to contractor dashboard.
      const isContractorLike =
        normalizedRole === "contractor" ||
        String(profile.contractorStage || "").toLowerCase() === "onboarding" ||
        String(profile.contractorStatus || "").toLowerCase() === "pending_documents" ||
        String(profile.contractorStatus || "").toLowerCase() === "pending_admin_review" ||
        String(profile.portalAccess || "").toLowerCase() === "onboarding_only";

      if (next === "contractor-dashboard.html" && (isContractorLike || normalizedRole === "admin")) return next;

      // Clients can return to the client dashboard.
      if (next === "client-dashboard.html" && (normalizedRole === "client" || normalizedRole === "admin")) return next;

      // Pending applicants can go back to application pages.
      if (next === "contractor-apply.html" && (normalizedRole === "pending" || normalizedRole === "client" || !normalizedRole)) return next;
      if (next === "employee-waitlist.html") return next;

      return "";
    }

    async function routeByRole(user){
      if (!user) {
        window.location.href = "index.html";
        return;
      }

      const profile = await ensureUserDoc(user);
      const role = String(profile.role || "").toLowerCase();
      const next = safeNextFromQuery();
      const allowedNext = nextAllowedForRole(next, role, profile);

      window.location.href = allowedNext || roleHome(role, profile);
    }

    preserveNextOnLinks();

    onAuthStateChanged(auth, (user) => {
      if (user) routeByRole(user);
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      errEl.hidden = true;

      const original = btn.textContent;
      btn.disabled = true;
      btn.textContent = "Signing in…";

      const emailVal = String(email.value || "").trim();
      const passVal = String(pass.value || "").trim();

      try {
        await signInWithEmailAndPassword(auth, emailVal, passVal);
        await routeByRole(auth.currentUser);
      } catch (e) {
        const map = {
          "auth/invalid-email": "That email doesn’t look right.",
          "auth/missing-password": "Please enter your password.",
          "auth/user-not-found": "No account found with that email.",
          "auth/wrong-password": "Incorrect password. Try again.",
          "auth/invalid-credential": "Incorrect email or password. Try again.",
          "auth/too-many-requests": "Too many attempts. Please wait a moment and try again."
        };

        errEl.textContent = map[e.code] || (e.message?.replace("Firebase: ", "") || "Sign in failed.");
        errEl.hidden = false;
        btn.disabled = false;
        btn.textContent = original;
      }
    });
  </script>
</body>
</html>
